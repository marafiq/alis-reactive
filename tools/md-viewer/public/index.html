<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reactive Reader</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">R</div>
        <div>
          <div class="sidebar-title">Reactive Reader</div>
          <div class="sidebar-subtitle">Collaboration Hub</div>
        </div>
      </div>
    </div>

    <!-- Primary nav tabs -->
    <div class="sidebar-nav" id="sidebar-nav">
      <button class="nav-tab active" data-view="plans" onclick="switchView('plans')">
        <span class="nav-icon">◆</span> Plans
      </button>
      <button class="nav-tab" data-view="board" onclick="switchView('board')">
        <span class="nav-icon">▦</span> Board
      </button>
      <button class="nav-tab" data-view="knowledge" onclick="switchView('knowledge')">
        <span class="nav-icon">◎</span> Knowledge
      </button>
      <button class="nav-tab" data-view="files" onclick="switchView('files')">
        <span class="nav-icon">▤</span> Files
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search..." autocomplete="off">
    </div>

    <div class="sidebar-content" id="sidebar-content"></div>
  </nav>

  <div class="sidebar-overlay" id="overlay"></div>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="top-bar">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>

    <!-- Dynamic content area -->
    <div class="view-container" id="view-container"></div>
  </main>

  <!-- REVIEW SLIDE-IN PANEL -->
  <aside class="review-panel" id="review-panel">
    <div class="review-panel-header">
      <h3 id="review-panel-title"></h3>
      <button class="review-panel-close" onclick="closeReviewPanel()">&times;</button>
    </div>
    <div class="review-panel-body" id="review-panel-body"></div>
  </aside>
</div>

<!-- VERDICT BAR -->
<div class="verdict-bar" id="verdict-bar" style="display:none">
  <div class="verdict-glance" id="verdict-glance"></div>
  <div class="verdict-actions">
    <button class="verdict-btn verdict-approve" onclick="humanVerdict('approve')">
      <span class="verdict-icon">✓</span> Approve
    </button>
    <button class="verdict-btn verdict-changes" onclick="humanVerdict('request-changes')">
      <span class="verdict-icon">✕</span> Request Changes
    </button>
    <button class="verdict-btn verdict-defer" onclick="humanVerdict('defer')">
      <span class="verdict-icon">⏸</span> Defer
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
