name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'Alis.Reactive/**'
      - 'Alis.Reactive.Native/**'
      - 'Alis.Reactive.Fusion/**'
      - 'Alis.Reactive.FluentValidator/**'
      - 'Alis.Reactive.SandboxApp/wwwroot/**'
      - 'examples/**'
      - 'scripts/rebuild-example-app.sh'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Rebuild example app (DLLs + JS/CSS + zip)
        working-directory: .
        run: ./scripts/rebuild-example-app.sh

      - name: Install D2 diagram tool
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  playwright:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build JS + CSS bundles
        run: npm run build:all

      - name: Build all C# projects
        run: dotnet build

      - name: Install Playwright browsers
        run: pwsh tests/Alis.Reactive.PlaywrightTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run Playwright tests
        run: |
          dotnet test tests/Alis.Reactive.PlaywrightTests \
            --no-build \
            --logger "html;LogFileName=playwright-report.html" \
            --logger "trx;LogFileName=playwright-results.trx" \
            --results-directory TestResults
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            TestResults/playwright-report.html
            TestResults/playwright-results.trx
            TestResults/playwright-traces/
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
