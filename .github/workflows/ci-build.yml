name: CI Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore

      - run: dotnet pack -c Release --no-build -o ./nupkgs

      - name: List packages
        run: ls -lh nupkgs/

      - name: Verify dual targets
        run: |
          for pkg in nupkgs/*.nupkg; do
            echo "=== $(basename $pkg) ==="
            unzip -l "$pkg" | grep -E "lib/net(48|10)" | head -10
          done

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg
